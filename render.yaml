# Definición de la base de datos PostgreSQL
databases:
  - name: inventory-db
    plan: free
    region: oregon

# Definición de los servicios (aplicaciones)
services:
  # ============================================================================
  # Backend NestJS API (Docker)
  # ============================================================================
  - type: web
    name: inventory-api
    runtime: docker
    region: oregon
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://inventory-frontend.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: santis3268@gmail.com
      - key: SMTP_PASSWORD
        generateValue: true
      - key: EMAIL_FROM
        value: noreply@inventory.com
      - key: ADMIN_EMAIL
        value: santis3268@gmail.com
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # ============================================================================
  # Frontend React + Vite (Sitio estático)
  # ============================================================================
  - type: web
    name: inventory-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://inventory-api.onrender.com
    autoDeploy: true