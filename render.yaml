services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  - type: pserv
    name: inventory-db
    plan: free
    region: oregon
    ipAllowList: []

  # ============================================================================
  # Backend NestJS API (Docker)
  # ============================================================================
  - type: web
    name: inventory-api
    env: docker
    repo: https://github.com/1036951896/INVENTORY
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    port: 3000

    envVars:
      - key: NODE_ENV
        value: production

      - key: API_PORT
        value: 3000

      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: CORS_ORIGIN
        value: https://inventory-frontend.onrender.com

      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: 587

      - key: SMTP_USER
        value: santis3268@gmail.com

      - key: SMTP_PASSWORD
        generateValue: true

      - key: EMAIL_FROM
        value: noreply@inventory.com

      - key: ADMIN_EMAIL
        value: santis3268@gmail.com

    dependsOn:
      - inventory-db

    healthCheckPath: /api/v1/health
    autoDeploy: true

  # ============================================================================
  # Frontend React + Vite
  # ============================================================================
  - type: web
    name: inventory-frontend
    env: static
    repo: https://github.com/1036951896/INVENTORY
    rootDir: ./frontend
    region: oregon

    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://inventory-api.onrender.com

    autoDeploy: true