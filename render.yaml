services:
  # ============================================================================
  # Backend NestJS API
  # ============================================================================
  - type: web
    name: inventory-api
    env: docker
    repo: https://github.com/1036951896/INVENTORY
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    port: 3000

    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://inventory-frontend-a8da.onrender.com
      - key: API_URL
        value: https://inventory-api-74yl.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: santis3268@gmail.com
      - key: SMTP_PASSWORD
        value: fnlrizogotanzrza
      - key: EMAIL_FROM
        value: noreply@inventory.com
      - key: ADMIN_EMAIL
        value: santis3268@gmail.com

    autoDeploy: true

    # Esperar a BD
    dependsOn:
      - inventory-db

    healthCheckPath: /api/v1/health

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  - type: pserv
    name: inventory-db
    plan: free
    ipAllowList: []

  # ============================================================================
  # Frontend React + Vite
  # ============================================================================
  - type: web
    name: inventory-frontend
    env: node
    repo: https://github.com/1036951896/INVENTORY
    rootDir: ./frontend
    runtime: node
    nodeVersion: 18

    buildCommand: npm install && npm run build
    startCommand: npm run preview

    envVars:
      - key: VITE_API_URL
        value: https://inventory-api-74yl.onrender.com
      - key: NODE_ENV
        value: production

    autoDeploy: true

    # Health check para frontend
    healthCheckPath: /
