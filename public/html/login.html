<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - StoreHub</title>
  <link rel="stylesheet" href="../css/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/logo-storehub.svg" type="image/svg+xml">  
  <script>
    window.BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://storehub-api-74yl.onrender.com';
  </script>  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      overflow-x: hidden;
    }

    /* ===== LAYOUT DIVIDIDO ===== */
    .auth-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ===== LADO IZQUIERDO - BRANDING ===== */
    .auth-left {
      flex: 1;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(52, 131, 250, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      top: -100px;
      right: -100px;
    }

    .auth-left::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -50px;
      left: -50px;
    }

    .auth-brand {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .auth-brand-logo {
      margin-bottom: 2rem;
    }

    .auth-brand-logo img {
      height: 80px;
      width: auto;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
    }

    .auth-brand h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .auth-brand p {
      font-size: 1.25rem;
      opacity: 1;
      line-height: 1.8;
      max-width: 350px;
      margin: 0 auto;
      font-weight: 500;
    }

    /* ===== LADO DERECHO - LOGIN ===== */
    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #f9fafb;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .login-header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .login-header h2 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.5rem;
    }

    .login-header .subtitle {
      color: #6b7280;
      font-size: 0.95rem;
    }

    /* ===== FORMULARIO ===== */
    .form-login {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1f2937;
    }

    .input-group input {
      padding: 0.875rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      background: #f9fafb;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3483fa;
      background: white;
      box-shadow: 0 0 0 3px rgba(52, 131, 250, 0.1);
    }

    .input-group input::placeholder {
      color: #d1d5db;
    }

    /* ===== BOTÓN ===== */
    .login-btn {
      padding: 0.875rem;
      height: 48px;
      background: linear-gradient(135deg, #3483fa 0%, #0055cc 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(52, 131, 250, 0.2);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(52, 131, 250, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* ===== MENSAJES ===== */
    .mensaje {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mensaje.error {
      background: #fef2f2;
      color: #991b1b;
      border-left: 4px solid #dc2626;
      display: block;
    }

    .mensaje.exito {
      background: #f0fdf4;
      color: #166534;
      border-left: 4px solid #16a34a;
      display: block;
    }

    /* ===== ENLACES ===== */
    .extra-links {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    .extra-links a {
      color: #3483fa;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s ease;
      flex: 1;
      text-align: center;
    }

    .extra-links a:hover {
      color: #0055cc;
      text-decoration: underline;
    }

    /* ===== TOAST NOTIFICATION ===== */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f2937;
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      z-index: 9999;
      animation: toastSlide 0.3s ease, toastFade 0.3s ease 2.7s forwards;
      max-width: 300px;
    }

    @keyframes toastSlide {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes toastFade {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateX(400px);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .auth-layout {
        flex-direction: column;
      }

      .auth-left {
        min-height: 35vh;
        padding: 2rem 1.5rem;
      }

      .auth-brand h1 {
        font-size: 1.875rem;
      }

      .auth-brand p {
        font-size: 0.95rem;
      }

      .auth-right {
        min-height: 65vh;
        padding: 2rem 1.5rem;
      }

      .login-card {
        padding: 2rem;
      }

      .login-header h2 {
        font-size: 1.5rem;
      }

      .toast {
        left: 20px;
        right: 20px;
        max-width: none;
      }
    }

    @media (max-width: 480px) {
      .auth-left {
        min-height: 30vh;
      }

      .auth-brand h1 {
        font-size: 1.5rem;
      }

      .auth-right {
        min-height: 70vh;
        padding: 1.5rem;
      }

      .login-card {
        padding: 1.5rem;
      }

      .login-header h2 {
        font-size: 1.25rem;
      }

      .extra-links {
        flex-direction: column;
      }

    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <!-- ===== LADO IZQUIERDO - BRANDING ===== -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="auth-brand-logo">
          <img src="../assets/logo-storehub.svg" alt="StoreHub Logo">
        </div>
        <h1>StoreHub</h1>
        <p>Gestiona. Compra. Vende. Todo en un solo lugar.</p>
      </div>
    </div>

    <!-- ===== LADO DERECHO - LOGIN ===== -->
    <div class="auth-right">
      <div class="login-card">
        <div class="login-header">
          <h2>Iniciar sesión</h2>
          <p class="subtitle">Accede a tu cuenta</p>
        </div>

        <form id="form-login" class="form-login">
          <div id="mensaje-login" class="mensaje"></div>

          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              required 
              placeholder="tu@email.com"
              autocomplete="email"
            >
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              required 
              placeholder="••••••••"
              autocomplete="current-password"
            >
          </div>

          <button type="submit" class="login-btn">
            Entrar
          </button>
        </form>

        <div class="extra-links">
          <a href="registro.html">Crear cuenta</a>
          <a href="index.html">← Volver</a>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast-notification" class="toast" style="display: none;"></div>

  <script>
    function mostrarToast(mensaje) {
      const toast = document.getElementById('toast-notification');
      toast.textContent = mensaje;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const mensajeEl = document.getElementById('mensaje-login');

      if (!email || !password) {
        mensajeEl.textContent = 'Por favor completa todos los campos';
        mensajeEl.classList.add('error');
        mensajeEl.classList.remove('exito');
        setTimeout(() => mensajeEl.classList.remove('error'), 4000);
        return;
      }

      try {
        const resp = await fetch(`${window.BACKEND_URL}/api/v1/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();
        
        if (!resp.ok) {
          let msg = data.message || 'Correo o contraseña incorrectos';
          mensajeEl.textContent = msg;
          mensajeEl.classList.add('error');
          mensajeEl.classList.remove('exito');
          setTimeout(() => mensajeEl.classList.remove('error'), 4000);
          return;
        }

        // Verificar el rol y redirigir
        if (data.user && (data.user.rol === 'ADMIN' || data.user.rol === 'admin')) {
          // LOGIN ADMIN
          const usuarioAdmin = {
            ...data.user,
            access_token: data.access_token,
            permisos: {
              ver_productos: true,
              editar_productos: true,
              eliminar_productos: true,
              crear_productos: true,
              ver_pedidos: true,
              editar_pedidos: true,
              autorizar_pedidos: true,
              rechazar_pedidos: true,
              ver_usuarios: true,
              ver_categorias: true,
              editar_categorias: true,
              ver_reportes: true,
              ver_configuracion: true
            }
          };
          localStorage.setItem('admin-token', data.access_token);
          localStorage.setItem('admin-usuario', JSON.stringify(usuarioAdmin));
          
          mensajeEl.textContent = '✅ Autenticación exitosa';
          mensajeEl.classList.add('exito');
          mensajeEl.classList.remove('error');
          
          mostrarToast(`👋 Bienvenido, ${data.user.nombre || 'Admin'}!`);
          
          setTimeout(() => {
            window.location.href = 'admin.html';
          }, 1500);
        } else {
          // LOGIN CLIENTE
          localStorage.removeItem('admin-token');
          localStorage.removeItem('admin-usuario');
          
          const usuarioCliente = {
            ...data.user,
            access_token: data.access_token,
            permisos: {
              ver_carrito: true,
              agregar_carrito: true,
              crear_pedidos: true,
              ver_pedidos: true,
              ver_direcciones: true,
              agregar_direcciones: true,
              editar_direcciones: true,
              eliminar_direcciones: true
            }
          };
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('usuario', JSON.stringify(usuarioCliente));
          
          mensajeEl.textContent = '✅ Autenticación exitosa';
          mensajeEl.classList.add('exito');
          mensajeEl.classList.remove('error');
          
          mostrarToast(`👋 Bienvenido, ${data.user.nombre || 'Cliente'}!`);
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        }
      } catch (err) {
        mensajeEl.textContent = 'Error de conexión con el servidor';
        mensajeEl.classList.add('error');
        mensajeEl.classList.remove('exito');
        setTimeout(() => mensajeEl.classList.remove('error'), 4000);
      }
    });
  </script>
</body>
</html>
