<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - StoreHub</title>
  <link rel="stylesheet" href="../css/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../assets/logo-storehub.svg" type="image/svg+xml">
  
  <script>
    window.BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://storehub-api-74yl.onrender.com';
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ===== WRAPPER ===== */
    .registro-wrapper {
      width: 100%;
      max-width: 520px;
    }

    /* ===== CARD ===== */
    .registro-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      padding: 3rem 2.5rem;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== HEADER ===== */
    .registro-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .registro-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.5rem;
    }

    .registro-header p {
      color: #6b7280;
      font-size: 0.9rem;
    }

    /* ===== FORMULARIO ===== */
    .form-registro {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ===== GRID 2 COLUMNAS ===== */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* ===== INPUT GROUP ===== */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f2937;
    }

    .input-group input {
      padding: 0.875rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      background: #f9fafb;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #386273;
      background: white;
      box-shadow: 0 0 0 3px rgba(56, 98, 115, 0.1);
    }

    .input-group input::placeholder {
      color: #d1d5db;
    }

    .input-group input:disabled {
      background: #f3f4f6;
      cursor: not-allowed;
      color: #9ca3af;
    }

    /* ===== SECCIÓN DIVISOR ===== */
    .section-divider {
      border-top: 1px solid #e5e7eb;
      margin: 0.5rem 0 1rem 0;
      padding-top: 1.25rem;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1f2937;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
    }

    /* ===== TÉRMINOS ===== */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem;
      background: #f9fafb;
      border-radius: 10px;
      margin-bottom: 0.5rem;
    }

    .terms-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 0.25rem;
      cursor: pointer;
      accent-color: #386273;
    }

    .terms-group label {
      font-size: 0.85rem;
      color: #6b7280;
      cursor: pointer;
      line-height: 1.5;
    }

    .terms-group a {
      color: #386273;
      text-decoration: none;
      font-weight: 600;
    }

    .terms-group a:hover {
      text-decoration: underline;
    }

    /* ===== BOTÓN ===== */
    .registro-btn {
      padding: 0.875rem;
      height: 48px;
      background: linear-gradient(135deg, #386273 0%, #2f5665 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(56, 98, 115, 0.2);
      margin-top: 0.5rem;
    }

    .registro-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 98, 115, 0.3);
    }

    .registro-btn:active {
      transform: translateY(0);
    }

    /* ===== MENSAJES ===== */
    .mensaje {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mensaje.error {
      background: #fef2f2;
      color: #991b1b;
      border-left: 4px solid #dc2626;
      display: block;
    }

    .mensaje.exito {
      background: #f0fdf4;
      color: #166534;
      border-left: 4px solid #16a34a;
      display: block;
    }

    /* ===== ENLACES ===== */
    .extra-links {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }

    .extra-links p {
      color: #6b7280;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .extra-links a {
      color: #386273;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .extra-links a:hover {
      color: #2f5665;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f2937;
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      z-index: 9999;
      animation: toastSlide 0.3s ease, toastFade 0.3s ease 2.7s forwards;
      max-width: 300px;
    }

    @keyframes toastSlide {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes toastFade {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
        transform: translateX(400px);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .registro-card {
        padding: 2rem;
      }

      .registro-header h1 {
        font-size: 1.5rem;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .toast {
        left: 20px;
        right: 20px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="registro-wrapper">
    <div class="registro-card">
      <div class="registro-header">
        <h1>Crear cuenta</h1>
        <p>Únete a StoreHub y comienza hoy</p>
      </div>

      <form id="form-registro" class="form-registro">
        <div id="mensaje-registro" class="mensaje"></div>

        <!-- ===== DATOS PERSONALES ===== -->
        <div class="grid-2">
          <div class="input-group">
            <label for="nombre">Nombre</label>
            <input 
              type="text" 
              id="nombre" 
              name="nombre" 
              required 
              placeholder="Juan"
              autocomplete="given-name"
            >
          </div>

          <div class="input-group">
            <label for="apellido">Apellido</label>
            <input 
              type="text" 
              id="apellido" 
              name="apellido" 
              required 
              placeholder="García"
              autocomplete="family-name"
            >
          </div>
        </div>

        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="tu@email.com"
            autocomplete="email"
          >
        </div>

        <div class="input-group">
          <label for="telefono">Teléfono</label>
          <input 
            type="tel" 
            id="telefono" 
            name="telefono" 
            required 
            placeholder="+57 300 1234567"
            autocomplete="tel"
          >
        </div>

        <!-- ===== DIRECCIÓN ===== -->
        <div class="section-divider">
          <div class="section-title">Dirección de envío</div>
        </div>

        <div class="input-group">
          <label for="calle">Calle</label>
          <input 
            type="text" 
            id="calle" 
            name="calle" 
            required 
            placeholder="Calle Principal"
            autocomplete="street-address"
          >
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label for="numero">Número</label>
            <input 
              type="text" 
              id="numero" 
              name="numero" 
              required 
              placeholder="123"
            >
          </div>

          <div class="input-group">
            <label for="apartamento">Apartamento (Opcional)</label>
            <input 
              type="text" 
              id="apartamento" 
              name="apartamento" 
              placeholder="Apt 4B"
            >
          </div>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label for="ciudad">Ciudad</label>
            <input 
              type="text" 
              id="ciudad" 
              name="ciudad" 
              required 
              placeholder="Bogotá"
              autocomplete="address-level2"
            >
          </div>

          <div class="input-group">
            <label for="departamento">Departamento</label>
            <input 
              type="text" 
              id="departamento" 
              name="departamento" 
              required 
              placeholder="Cundinamarca"
              autocomplete="address-level1"
            >
          </div>
        </div>

        <div class="grid-2">
          <div class="input-group">
            <label for="codigoPostal">Código Postal (Opcional)</label>
            <input 
              type="text" 
              id="codigoPostal" 
              name="codigoPostal" 
              placeholder="110111"
              autocomplete="postal-code"
            >
          </div>

          <div class="input-group">
            <label for="pais">País</label>
            <input 
              type="text" 
              id="pais" 
              name="pais" 
              value="Colombia"
              disabled
            >
          </div>
        </div>

        <!-- ===== SEGURIDAD ===== -->
        <div class="section-divider">
          <div class="section-title">Contraseña</div>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="••••••••"
            autocomplete="new-password"
          >
        </div>

        <div class="input-group">
          <label for="confirmar-password">Confirmar contraseña</label>
          <input 
            type="password" 
            id="confirmar-password" 
            name="confirmPassword" 
            required 
            placeholder="••••••••"
            autocomplete="new-password"
          >
        </div>

        <!-- ===== TÉRMINOS ===== -->
        <div class="terms-group">
          <input 
            type="checkbox" 
            id="terminos" 
            name="terminos" 
            required
          >
          <label for="terminos">
            Acepto los <a href="#" target="_blank">términos y condiciones</a> y la <a href="#" target="_blank">política de privacidad</a>
          </label>
        </div>

        <button type="submit" class="registro-btn">
          Crear cuenta
        </button>
      </form>

      <div class="extra-links">
        <p>¿Ya tienes cuenta?</p>
        <a href="login.html">Inicia sesión aquí</a>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast-notification" class="toast" style="display: none;"></div>

  <script>
    function mostrarToast(mensaje) {
      const toast = document.getElementById('toast-notification');
      toast.textContent = mensaje;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    document.getElementById('form-registro').addEventListener('submit', async function(e) {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const email = document.getElementById('email').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmar-password').value;
      const terminos = document.getElementById('terminos').checked;
      const mensajeEl = document.getElementById('mensaje-registro');

      if (!nombre || !apellido || !email || !telefono || !password || !confirmPassword) {
        mensajeEl.textContent = 'Por favor completa todos los campos obligatorios';
        mensajeEl.classList.add('error');
        mensajeEl.classList.remove('exito');
        setTimeout(() => mensajeEl.classList.remove('error'), 4000);
        return;
      }

      if (password !== confirmPassword) {
        mensajeEl.textContent = 'Las contraseñas no coinciden';
        mensajeEl.classList.add('error');
        mensajeEl.classList.remove('exito');
        setTimeout(() => mensajeEl.classList.remove('error'), 4000);
        return;
      }

      if (!terminos) {
        mensajeEl.textContent = 'Debes aceptar los términos y condiciones';
        mensajeEl.classList.add('error');
        mensajeEl.classList.remove('exito');
        setTimeout(() => mensajeEl.classList.remove('error'), 4000);
        return;
      }

      try {
        const usuarioData = {
          nombre,
          apellido,
          email,
          telefono,
          password,
          rol: 'CLIENTE',
          direccion: {
            calle: document.getElementById('calle').value,
            numero: document.getElementById('numero').value,
            apartamento: document.getElementById('apartamento').value || null,
            ciudad: document.getElementById('ciudad').value,
            departamento: document.getElementById('departamento').value,
            codigoPostal: document.getElementById('codigoPostal').value || null,
            pais: 'Colombia'
          }
        };

        const resp = await fetch(`${window.BACKEND_URL}/api/v1/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(usuarioData)
        });

        const data = await resp.json();

        if (!resp.ok) {
          let msg = data.message || 'Error al crear la cuenta';
          mensajeEl.textContent = msg;
          mensajeEl.classList.add('error');
          mensajeEl.classList.remove('exito');
          setTimeout(() => mensajeEl.classList.remove('error'), 4000);
          return;
        }

        mensajeEl.textContent = '✅ Cuenta creada exitosamente';
        mensajeEl.classList.add('exito');
        mensajeEl.classList.remove('error');

        mostrarToast(`👋 ¡Bienvenido, ${nombre}!`);

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        mensajeEl.textContent = 'Error de conexión con el servidor';
        mensajeEl.classList.add('error');
        mensajeEl.classList.remove('exito');
        setTimeout(() => mensajeEl.classList.remove('error'), 4000);
      }
    });
  </script>
</body>
</html>

              type="text"

        <div class="grupo-formulario">

            id="email-registro"

            required

        <div class="grupo-formulario">

            type="tel"

            name="telefono"

            placeholder="+506 2345-6789"

        </div>

        <!-- SECCIÓN DE DIRECCIÓN -->

              type="text" 
              id="calle" 
              name="calle"

              placeholder="Calle Principal"
            >
          </div>

          <div class="grupo-formulario-doble">
            <div class="grupo-formulario">
              <label for="numero">Número</label>
              <input 
                type="text" 
                id="numero" 
                name="numero" 
                required 
                placeholder="123"
              >
            </div>

            <div class="grupo-formulario">
              <label for="apartamento">Apartamento (Opcional)</label>
              <input 
                type="text" 
                id="apartamento" 
                name="apartamento" 
                placeholder="Apt 4B"
              >
            </div>
          </div>

          <div class="grupo-formulario-doble">
            <div class="grupo-formulario">
              <label for="ciudad">Ciudad</label>
              <input 
                type="text" 
                id="ciudad" 
                name="ciudad" 
                required 
                placeholder="Bogotá"
              >
            </div>

            <div class="grupo-formulario">
              <label for="departamento">Departamento/Provincia</label>
              <input 
                type="text" 
                id="departamento" 
                name="departamento" 
                required 
                placeholder="Cundinamarca"
              >
            </div>
          </div>

          <div class="grupo-formulario-doble">
            <div class="grupo-formulario">
              <label for="codigoPostal">Código Postal (Opcional)</label>
              <input 
                type="text" 
                id="codigoPostal" 
                name="codigoPostal" 
                placeholder="110111"
              >
            </div>

            <div class="grupo-formulario">
              <label for="pais">País</label>
              <input 
                type="text" 
                id="pais" 
                name="pais" 
                required 
                value="Colombia"
                readonly
                style="background-color: #f5f5f5; cursor: not-allowed;"
              >
            </div>
          </div>
        </div>
          <div class="grupo-formulario">
            <label for="password-registro">Contraseña</label>
            <input 
              type="password" 
              id="password-registro" 
              name="password" 
              required 
              placeholder="••••••••"
            >
          </div>

          <div class="grupo-formulario">
            <label for="confirmar-password">Confirmar Contraseña</label>
            <input 
              type="password" 
              id="confirmar-password" 
              name="confirmPassword" 
              required 
              placeholder="••••••••"
            >
          </div>
        </div>

        <button type="submit" class="btn-principal">
          Registrarse
        </button>
      </form>
